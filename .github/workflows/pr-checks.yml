name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            db:
              - 'db/**'

  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run client tests
        run: npm run test -- --run client/

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gachabeats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run server tests
        run: npm run test -- --run server/
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/gachabeats_test
          SESSION_SECRET: test-secret-key

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [detect-changes, client-tests, server-tests]
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const clientStatus = '${{ needs.client-tests.result }}';
            const serverStatus = '${{ needs.server-tests.result }}';
            const clientChanged = '${{ needs.detect-changes.outputs.client }}' === 'true';
            const serverChanged = '${{ needs.detect-changes.outputs.server }}' === 'true';

            let body = '## 🤖 PR Check Results\n\n';

            // Client tests
            if (clientChanged) {
              body += `- **Client Tests**: ${clientStatus === 'success' ? '✅ Passed' : clientStatus === 'skipped' ? '⏭️ Skipped' : '❌ Failed'}\n`;
            } else {
              body += `- **Client Tests**: ⏭️ Skipped (no changes)\n`;
            }

            // Server tests
            if (serverChanged) {
              body += `- **Server Tests**: ${serverStatus === 'success' ? '✅ Passed' : serverStatus === 'skipped' ? '⏭️ Skipped' : '❌ Failed'}\n`;
            } else {
              body += `- **Server Tests**: ⏭️ Skipped (no changes)\n`;
            }

            // Summary
            body += '\n';
            if (clientStatus === 'failure' || serverStatus === 'failure') {
              body += '### ⚠️ Action Required\n\n';
              body += 'Some checks failed. Please review the workflow logs and fix the issues.\n\n';
              body += '**Next steps:**\n';
              body += '1. Check the "Details" link on the failing check\n';
              body += '2. Fix the issues locally\n';
              body += '3. Push your changes\n';
            } else if (!clientChanged && !serverChanged) {
              body += '### ℹ️ No Code Changes\n\n';
              body += 'No client or server code was changed in this PR.\n';
            } else {
              body += '### ✅ All Checks Passed!\n\n';
              body += 'Your PR is ready for review. Great work! 🎉\n';
            }

            body += '\n---\n<sub>🤖 Automated by PR Checks | [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
